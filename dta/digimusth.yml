description:
  Die Sammlung DigiMusTh enthält 11 deutschsprachige, musiktheoretische Texte
  aus dem 19. Jahrhundert. Sie entstand in einem Text+ Kooperationsprojekt an
  der Julius-Maximilians-Universität Würzburg unter der Leitung von Prof. Dr.
  Fabian C. Moss.

  Alle Texte der Sammlung sind kodiert nach TEI P5 – orientiert am
  Basisformat des Deutschen Textarchivs (DTABf) – und werden unter einer CC
  BY-SA Lizenz zur Nachnutzung bereitgestellt.
